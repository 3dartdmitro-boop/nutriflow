{% extends "base.html" %}
{% block title %}NutriFlow{% endblock %}
{% block content %}
<section class="page">
    <h2 data-i18n="weight_title">Вес</h2>
    <p class="muted" data-i18n="weight_subtitle">Отслеживай изменения веса</p>

    <div class="card" style="margin-top:16px">
        <form id="weight-form" class="weight-form">
            <label><span data-i18n="current_weight">Текущий вес (кг)</span>
                <input type="number" step="0.1" name="weight" placeholder="70.0" required>
            </label>
            <button type="submit" class="btn btn-primary full-width" data-i18n="save">Сохранить</button>
        </form>
    </div>

    <div class="card" style="margin-top:16px">
        <h3 data-i18n="weight_chart_title">График веса</h3>
        <canvas id="weight-chart" width="400" height="200"></canvas>
    </div>

    <h3 class="section-title" data-i18n="history">История</h3>
    <div id="weight-history" class="weight-history"></div>
</section>
{% endblock %}
