<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>{% block title %}NutriFlow{% endblock %}</title>

<!-- PWA -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0071e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriFlow">
<link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">

<!-- CSS -->
<link rel="stylesheet" href="/static/css/style.css?v=800">
</head>
<body>
<div class="app-shell">
<div class="app-header">
<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
<svg id="theme-icon-sun" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="4"/><path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.9 3.9l1.4 1.4M14.7 14.7l1.4 1.4M3.9 16.1l1.4-1.4M14.7 5.3l1.4-1.4"/></svg>
<svg id="theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
</button>
<button class="lang-toggle-small" onclick="toggleLang()" id="lang-btn">EN</button>
<a href="/reminders" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;border:none;cursor:pointer;" title="Reminders">🔔</a>
</div>
<div class="app-content">
{% block content %}{% endblock %}
</div>
<nav class="tab-bar">
<a href="/dashboard" class="tab-item" data-page="dashboard">
<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="13" y="3" width="7" height="7" rx="2"/><rect x="3" y="13" width="7" height="7" rx="2"/><rect x="13" y="13" width="7" height="7" rx="2"/></svg>
<span data-i18n="nav_home">Главная</span>
</a>
<a href="/food" class="tab-item" data-page="food">
<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
<span data-i18n="nav_food">Еда</span>
</a>
<a href="/water" class="tab-item" data-page="water">
<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>
<span data-i18n="nav_water">Вода</span>
</a>
<a href="/weight" class="tab-item" data-page="weight">
<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
<span data-i18n="nav_weight">Вес</span>
</a>
<a href="/goals" class="tab-item" data-page="goals">
<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="9"/><path d="M11 7v4l3 3"/></svg>
<span data-i18n="nav_goals">Цели</span>
</a>
<a href="/progress" class="tab-item" data-page="progress">
<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 18 8 12 12 14 16 8 20 10"/></svg>
<span data-i18n="nav_progress">Прогресс</span>
</a>
</nav>
</div>
<script src="/static/js/lang.js?v=800"></script>
<script src="/static/js/i18n.js?v=800"></script>
<script src="/static/js/app.js?v=800"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js')
      .then(function(reg) { console.log('SW registered', reg.scope); })
      .catch(function(err) { console.log('SW error', err); });
  });
}
</script>
</body>
</html>
